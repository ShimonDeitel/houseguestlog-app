name: HouseguestLog
options:
  bundleIdPrefix: com.shimondeitel.houseguestlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  HouseguestLog:
    type: application
    platform: iOS
    sources:
      - path: HouseguestLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.houseguestlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: HouseguestLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  HouseguestLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HouseguestLogTests
      - path: HouseguestLog.storekit
    dependencies:
      - target: HouseguestLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.houseguestlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  HouseguestLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HouseguestLogUITests
    dependencies:
      - target: HouseguestLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.houseguestlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  HouseguestLog:
    build:
      targets:
        HouseguestLog: all
        HouseguestLogTests: [test]
        HouseguestLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: HouseguestLog.storekit
    test:
      config: Debug
      storeKitConfiguration: HouseguestLog.storekit
      targets:
        - HouseguestLogTests
        - HouseguestLogUITests
    archive:
      config: Release
